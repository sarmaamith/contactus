<!DOCTYPE html>
<html lang="en">
<head>
    

<!-- After adding this script, call setConsentBannerParams({uuid: <unique id> }) to set unique ID for a customer.  -->
<script>
(function () {
	var s = document.createElement('script');
	s.src = 'https://cdn-prod.securiti.ai/consent/cookie-consent-sdk-loader.js';
	s.setAttribute('data-tenant-uuid', 'd7c23e03-a410-47f0-9f8f-122a277ab8c7');
	s.setAttribute('data-domain-uuid', 'e8c8f715-d3df-4033-b279-1b21e1195ea8');

	parent_node.appendChild(s);

</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Connection Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            margin: auto;
            text-align: center;
        }
        .logo {
            width: 100%;
            max-height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
            display: block;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            text-align: left;
        }
        .checkbox-group input {
            width: auto;
        }
        .checkbox-group label {
            font-weight: normal;
            cursor: pointer;
        }
        .checkbox-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-left: 25px;
        }
        .privacy-link {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .privacy-link:hover {
            text-decoration: underline;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        .preferences-btn {
            background-color: #007bff;
        }
        .preferences-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HNB Logo -->
    <img src="https://raw.githubusercontent.com/sarmaamith/contactus/main/nh.png" alt="IDBILogo" class="logo">
    
    <h2>New connection Form</h2>

    <form action="#" method="POST">
        
        <!-- Personal Information -->
        <label for="full_name">Full Name:</label>
        <input type="text" id="full_name" name="full_name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" maxlength="10" required placeholder="Enter 10-digit phone number">

        <label for="pan_card">PAN Card:</label>
        <input type="text" id="pan_card" name="pan_card" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" maxlength="10" required placeholder="Enter PAN (e.g., JGAPS7106A)">

        <!-- Consent Section -->
        <div class="consent-section">
            <div class="checkbox-group">
                <input type="checkbox" id="consent1" name="consent1" required>
                <label for="consent1">
                    I have read the <a href="https://privacy-central.securiti.ai/#/notices/364fe4d8-bc20-42b6-bc57-aad5daa5dfea" target="_blank" class="privacy-link">Terms and Conditions</a> and 
                    <a href="https://privacidemo148412.app.privacycenter.cloud/#/?tab=HOME" target="_blank" class="privacy-link">Privacy Policy</a>. I explicitly consent to the collection, use, processing, and sharing of my personal and financial data by Narayana Health for processing my account opening application and offering relevant services.
                </label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="consent2" name="consent2" required>
                <label for="consent2">
                    I grant explicit permission to Narayana Health to access and receive my Credit Information, including my credit score, credit history, and any associated data from authorized credit bureau, as part of the application process.
                </label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="consent3" name="consent3" required>
                <label for="consent3">
                    I consent to being contacted by Narayana Health and its representatives via the following channels:
                </label>
            </div>

            <!-- Communication Preferences (All in One Line) -->
            <div class="checkbox-container">
                <div class="checkbox-group">
                    <input type="checkbox" id="channel1" name="channel1">
                    <label for="channel1">Telephone</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="channel2" name="channel2">
                    <label for="channel2">SMS</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="channel3" name="channel3">
                    <label for="channel3">Email</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="channel4" name="channel4">
                    <label for="channel4">WhatsApp</label>
                </div>
             </div>

            <div class="checkbox-group">
                <input type="checkbox" id="consent5" name="consent5" required>
                <label for="consent5">
                    I understand that my data will be retained by Narayana Health for the necessary duration as required for processing my application, provision of services, and in compliance with regulatory obligations.
                </label>
            </div>

            <!-- Newly Added Last Checkbox -->
            <div class="checkbox-group">
                <input type="checkbox" id="consent6" name="consent6" required>
                <label for="consent6">
                    I confirm that I have attained the age of majority, and I am a resident of India.  
                    I also confirm that I am not a tax resident of any other country and am not a politically exposed person.
                </label>
            </div>
        </div>

        <!-- Buttons Section -->
        <div class="button-container">
            <button type="submit">Submit Application</button>
            <a href="https://privacy-central.securiti.ai/#/form-access-preference/ba929232-efc6-41dc-b265-0ad67859eb1e/c0527c26-776b-4d57-ac91-055145e6f170?hsl=1" target="_blank">
                <button type="button" class="preferences-btn">Manage Preferences</button>
            </a>
        </div>

    </form>
</div>


    

<script>
// Attach an event listener to the form to handle the submit action
document.querySelector('form').addEventListener('submit', async function(event) {
    // Prevent the default form submission (which reloads the page)
    event.preventDefault(); 

    // 1. Capture Form Details
    const emailValue = document.getElementById('email').value;
    const phoneValue = document.getElementById('phone').value;
    const full_nameValue = document.getElementById('full_name').value;
    const pancardValue = document.getElementById('pan_card').value;

    // 2. Capture Checkbox States (Returns true if checked, false if not)
    const TandCGranted = document.getElementById('consent1').checked; // Terms & Privacy
    const CreditInfoGranted = document.getElementById('consent2').checked; // Credit Info
    const AllChannelsGranted = document.getElementById('consent3').checked; // Master Communication Consent
    const DataretentionGranted = document.getElementById('consent5').checked; // Data Retention
    const ResidentConfirmationGranted = document.getElementById('consent6').checked; // Resident & Age Confirmation
    
    // Channel Communication Logic:
    const phoneChannelGranted = AllChannelsGranted || document.getElementById('channel1').checked; 
    const smsChannelGranted = AllChannelsGranted || document.getElementById('channel2').checked; 
    const emailChannelGranted = AllChannelsGranted || document.getElementById('channel3').checked; 
    const whatsappChannelGranted = AllChannelsGranted || document.getElementById('channel4').checked; 

    // 3. Construct the API Payload (Aligned with working test script)
    const payload = {
        "UUID": emailValue, 
        "uuids": {
            "email": emailValue,
            "phone": phoneValue,
            "full_name": full_nameValue,
            "pan_card": pancardValue
        },
        "activity_timestamp": Math.floor(Date.now() / 1000), 
        "consent_source": "Narayana WebForm", 
        "consent_info": [
            {
                "processing_purpose_name": "Account Opening",
                "consented_items": [
                    {
                        "consent_purpose_name": "Terms and Privacy Policy",
                        "consent_granted": TandCGranted
                    },
                    {
                        "consent_purpose_name": "Resident and Age Confirmation",
                        "consent_granted": ResidentConfirmationGranted
                    }
                ]
            },
            {
                "processing_purpose_name": "Credit Check",
                "consented_items": [
                    {
                        "consent_purpose_name": "Credit Bureau Access",
                        "consent_granted": CreditInfoGranted
                    }
                ]
            },
            {
                "processing_purpose_name": "Data Lifecycle Management",
                "consented_items": [
                    {
                        "consent_purpose_name": "Data Retention Policy",
                        "consent_granted": DataretentionGranted
                    }
                ]
            },
            {
                "processing_purpose_name": "Marketing Communication",
                "consented_items": [
                    {
                        "consent_purpose_name": "Telephone",
                        "consent_granted": phoneChannelGranted
                    },
                    {
                        "consent_purpose_name": "SMS",
                        "consent_granted": smsChannelGranted
                    },
                    {
                        "consent_purpose_name": "Email",
                        "consent_granted": emailChannelGranted
                    },
                    {
                        "consent_purpose_name": "WhatsApp",
                        "consent_granted": whatsappChannelGranted
                    }
                ]
            }
        ]
    };

    // 4. Make the API Call to Securiti.ai (Headers aligned with working test script)
    try {
        const response = await fetch('https://app.securiti.ai/privaci/v1/consentapi/consent_upload', {
            method: 'POST',
            headers: {
                'X-API-Key': 'GYsPcqTmOKEXcXq7M15ElbXOsga80rk0W367rmk9',
                'X-API-Secret': '85fzFjPye5XzO8yjXLsa9bP0Ol3zcPjl5Yd17bXM',
                'X-TIDENT': '09f99b07-9b72-4dd3-b6b5-1009a96c2fd4',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            const result = await response.json();
            console.log('Consent successfully uploaded:', result);
            alert("Application submitted successfully!");
        } else {
            console.error('API Error:', response.status, await response.text());
            alert("There was an error submitting your application.");
        }
    } catch (error) {
        console.error('Fetch Error:', error);
    }
});
</script>
</body>
</html>
